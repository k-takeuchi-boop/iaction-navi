<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>誘致先候補リスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3f1ea;
    --surface:#ffffff;
    --border:#e5e1d3;
    --border-strong:#d1cab5;
    --ink:#1b211d;
    --ink-soft:#5a6058;
    --ink-mute:#93907f;
    --accent:#132c40;
    --accent-2:#1f6f5c;
    --accent-soft:#e6ecee;
    --mall-bg:#e1efe9; --mall-fg:#1f6f5c;
    --clinic-fg:#bb5c17;
    --clinic-bg2:#fbe8d3;
    --yes-bg:#e4f0e1; --yes-fg:#2c6437;
    --no-bg:#f6e5da; --no-fg:#a1451f;
    --unk-bg:#eeece1; --unk-fg:#68655a;
  }
  *{box-sizing:border-box}
  html{background:var(--bg)}
  body{
    margin:0;
    font-family:"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }


  #app{max-width:560px;margin:0 auto;padding:0 14px 70px}

  .header{
    position:sticky; top:0; background:var(--bg);
    padding:16px 0 10px; z-index:20;
  }
  .eyebrow{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:10px;
  }
  .eyebrow .name{
    font-weight:800; font-size:19px;
    letter-spacing:.02em; color:var(--ink);
  }
  .eyebrow .count{ font-size:12px; color:var(--ink-mute) }

  .search{
    width:100%; padding:11px 14px; border:1px solid var(--border-strong);
    border-radius:10px; font-size:14px; margin-bottom:8px; background:var(--surface);
    color:var(--ink); font-family:inherit;
  }
  .search::placeholder{ color:var(--ink-mute) }

  .tabs{display:flex; gap:6px; border-bottom:1px solid var(--border); padding-bottom:10px}
  .tab{
    flex:1; padding:9px 4px; font-size:13px; text-align:center;
    border:1px solid var(--border-strong); border-radius:8px;
    background:var(--surface); color:var(--ink-soft); cursor:pointer;
    font-family:inherit; font-weight:500; transition:background .15s, color .15s, border-color .15s;
  }
  .tab.active{ background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 2px 6px -2px rgba(19,44,64,.4) }

  .status{ padding:28px 4px; color:var(--ink-mute); font-size:13px; text-align:center }

  .list{ display:flex; flex-direction:column; gap:12px; margin-top:14px }

  .card{
    position:relative;
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:16px 18px 15px 20px; cursor:pointer;
    box-shadow:0 1px 2px rgba(20,18,10,.03), 0 10px 24px -10px rgba(20,18,10,.14);
    overflow:hidden;
    transition:box-shadow .15s;
  }
  .card:hover{ box-shadow:0 2px 4px rgba(20,18,10,.05), 0 14px 30px -10px rgba(20,18,10,.18); }
  .card::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
  }
  .card.t-mall::before{ background:var(--mall-fg) }
  .card.t-clinic::before{ background:var(--clinic-fg) }

  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px }
  .card-title{ font-weight:700; font-size:16px; line-height:1.45 }
  .listno{ font-size:10px; color:var(--ink-mute); letter-spacing:.06em; white-space:nowrap; padding-top:3px; font-variant-numeric:tabular-nums }

  .badges{ display:flex; gap:6px; margin:9px 0 7px; flex-wrap:wrap }
  .badge{ font-size:11px; padding:3px 9px; border-radius:20px; font-weight:500 }
  .badge.tag-mall{ background:var(--mall-bg); color:var(--mall-fg) }
  .badge.tag-clinic{ background:var(--clinic-bg2); color:var(--clinic-fg) }
  .badge.trade-yes{ background:var(--yes-bg); color:var(--yes-fg) }
  .badge.trade-no{ background:var(--no-bg); color:var(--no-fg) }
  .badge.trade-unk{ background:var(--unk-bg); color:var(--unk-fg) }
  .badge.vac-yes{ background:var(--accent-2); color:#fff; font-weight:700; letter-spacing:.01em }
  .badge.vac-no{ background:var(--unk-bg); color:var(--ink-mute) }

  .row-line{ font-size:13px; color:var(--ink-soft); display:flex; align-items:center; gap:5px; margin-top:3px }
  .row-line .muted{ color:var(--ink-mute) }

  .chevron{
    text-align:right; margin-top:10px; color:var(--accent); font-size:12px; font-weight:500;
    display:flex; justify-content:flex-end; align-items:center; gap:3px;
  }

  .detail{ margin-top:12px; padding-top:12px; border-top:1px dashed var(--border-strong) }

  .gallery{ display:flex; gap:8px; margin-bottom:10px; overflow-x:auto; padding-bottom:2px; scroll-snap-type:x proximity }
  .photo{
    flex:0 0 auto; width:104px; height:78px; border-radius:9px; overflow:hidden;
    background:var(--accent-soft); display:flex; align-items:center; justify-content:center;
    scroll-snap-align:start; border:1px solid var(--border);
  }
  .photo img{ width:100%; height:100%; object-fit:cover; display:block }
  .photo.empty{ color:var(--ink-mute); font-size:10px; letter-spacing:.04em; font-weight:500 }

  .docs{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px }
  .doclink{
    font-size:12px; color:var(--accent); text-decoration:none; font-weight:500;
    padding:6px 11px; background:var(--accent-soft); border-radius:20px; display:inline-flex;
    align-items:center; gap:4px;
  }
  .doclink-empty{ background:var(--unk-bg); color:var(--ink-mute); font-weight:400 }

  .spec{ display:flex; flex-direction:column }

  .facility-list{ display:flex; flex-direction:column; gap:6px; margin-bottom:12px }
  .facility-row{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    padding:8px 10px; background:var(--accent-soft); border-radius:8px;
  }
  .facility-name{ font-size:13px; font-weight:500; color:var(--ink) }
  .drow{
    display:flex; justify-content:space-between; gap:14px; padding:9px 0;
    border-top:1px solid var(--border); font-size:13px;
  }
  .drow:first-child{ border-top:none }
  .drow .label{
    color:var(--ink-mute); font-size:11px; white-space:nowrap; flex-shrink:0;
    padding-top:2px; letter-spacing:.03em;
  }
  .drow .value{ text-align:right; color:var(--ink); line-height:1.5 }
  .drow.hi .value{ font-weight:800; font-size:14.5px; color:var(--accent) }
  .drow a{ color:var(--accent); text-decoration:none; border-bottom:1px solid var(--accent); }
  .placeholder{ color:var(--ink-mute) }

  @media (min-width: 760px){
    #app{max-width:1120px; padding:0 32px 70px}
    .header{padding:22px 0 14px}
    .search{max-width:420px}
    .tabs{max-width:420px}
    .list{ max-width:640px; margin:14px auto 0 }
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="eyebrow">
      <span class="name">誘致先候補リスト</span>
      <span class="count" id="countLabel"></span>
    </div>
    <input class="search" id="searchInput" type="text" placeholder="薬局名・住所で検索">
    <div class="tabs">
      <div class="tab active" data-t="all">すべて</div>
      <div class="tab" data-t="recruiting">誘致場所あり</div>
    </div>
  </div>
  <div id="status" class="status">読み込み中...</div>
  <div id="list" class="list"></div>
</div>

<script>
// ↓↓↓ ここをGASのウェブアプリURLに差し替え ↓↓↓
const API_URL = "https://script.google.com/a/macros/kinkiyoken.co.jp/s/AKfycbwtN-i6hbg6tvLbHoh6-YYb9srwAIBodOtHtbm_UQNyoLMSpEKzkS0IE01-HRhNiJmV/exec";

let allData = [];
let currentTab = 'all';
let expandedIndex = null;

function loadDataJSONP(){
  return new Promise((resolve, reject)=>{
    const cbName = 'jsonpCallback_' + Date.now();
    const script = document.createElement('script');
    let done = false;

    window[cbName] = function(data){
      done = true;
      resolve(data);
      delete window[cbName];
      script.remove();
    };

    script.src = API_URL + (API_URL.includes('?') ? '&' : '?') + 'callback=' + cbName;
    script.onerror = () => {
      if(!done) reject(new Error('スクリプトの読み込みに失敗しました'));
    };
    document.body.appendChild(script);

    setTimeout(()=>{
      if(!done) reject(new Error('タイムアウトしました'));
    }, 15000);
  });
}

async function loadData(){
  const statusEl = document.getElementById('status');
  try{
    const raw = await loadDataJSONP();
    allData = groupData(raw);
    statusEl.style.display = 'none';
    render();
  }catch(err){
    statusEl.textContent = 'データの読み込みに失敗しました（' + err.message + '）';
  }
}

const SHARED_FIELDS = [
  '所在地','空きテナント面積(坪)／空き地面積(坪)','賃料目安／想定坪単価',
  '既存テナント診療科構成（モール型のみ）','用途地域（クリニック型のみ）',
  '管理会社・地主/仲介先連絡先','アクセス（最寄駅・幹線道路）',
  '周辺医療機関（診療科:距離、カンマ区切り）','不足していそうな診療科（誘致ターゲット候補）',
  '誘致余地','情報更新日','備考',
  '写真URL①','写真URL②','写真URL③','関連資料URL①','関連資料URL②'
];

function groupData(rows){
  const map = new Map();
  rows.forEach(d=>{
    const key = d['薬局名（基準地点）'];
    if(!map.has(key)){
      map.set(key, { base:key, 分類:d['分類'], facilities:[] });
    }
    const g = map.get(key);
    if(!g.分類 && d['分類']) g.分類 = d['分類'];
    g.facilities.push({
      name: d['施設名'],
      trade: (d['既存臨床取引'] || '').trim()
    });
    SHARED_FIELDS.forEach(f=>{
      if(!g[f] && d[f]) g[f] = d[f];
    });
  });
  return Array.from(map.values());
}

function esc(s){
  if(s === undefined || s === null) return '';
  return String(s);
}

function mapLink(address){
  if(!address) return '';
  const url = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(address);
  return `<a href="${url}" target="_blank" rel="noopener">${esc(address)} ↗</a>`;
}

function formatDateDisplay(v){
  if(!v) return '';
  const s = String(v);
  if(/^\d{4}-\d{2}-\d{2}T/.test(s)){
    const d = new Date(s);
    if(!isNaN(d)){
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}/${m}/${day}`;
    }
  }
  return s;
}

function drow(label, valueHtml, hi){
  const display = valueHtml ? valueHtml : '<span class="placeholder">未入力</span>';
  return `<div class="drow${hi?' hi':''}"><span class="label">${label}</span><span class="value">${display}</span></div>`;
}

function photoBlock(d){
  const urls = [d['写真URL①'], d['写真URL②'], d['写真URL③']];
  const slots = urls.map(u=>{
    if(u) return `<a class="photo" href="${u}" target="_blank" rel="noopener"><img src="${u}" loading="lazy"></a>`;
    return `<div class="photo empty">NO IMAGE</div>`;
  });
  return `<div class="gallery">${slots.join('')}</div>`;
}

function docBlock(g){
  const docs = [
    {label:'関連資料①', url:g['関連資料URL①']},
    {label:'関連資料②', url:g['関連資料URL②']}
  ];
  const chips = docs.map(x=> x.url
    ? `<a class="doclink" href="${x.url}" target="_blank" rel="noopener">📄 ${x.label}</a>`
    : `<span class="doclink doclink-empty">📄 ${x.label} 未登録</span>`
  );
  return `<div class="docs">${chips.join('')}</div>`;
}

function facilityListHtml(facilities){
  return facilities.map(f=>{
    const cls = f.trade === '〇' ? 'trade-yes' : (f.trade === '×' ? 'trade-no' : 'trade-unk');
    return `<div class="facility-row">
      <span class="facility-name">${esc(f.name)}</span>
      <span class="badge ${cls}">取引 ${f.trade || '不明'}</span>
    </div>`;
  }).join('');
}

function tradeSummary(facilities){
  const vals = facilities.map(f=>f.trade);
  if(vals.every(v=>v==='〇')) return {cls:'trade-yes', label:'取引あり'};
  if(vals.every(v=>v==='×')) return {cls:'trade-no', label:'取引なし'};
  if(vals.some(v=>v==='〇')) return {cls:'trade-yes', label:'一部取引あり'};
  return {cls:'trade-unk', label:'取引状況 不明'};
}

function cardHtml(g, idx){
  const isMall = g['分類'] === '医療モール型';
  const summary = tradeSummary(g.facilities);
  const vacVal = (g['誘致余地'] || '').trim();
  const vacBadge = vacVal === 'あり'
    ? `<span class="badge vac-yes">◎ 誘致余地あり</span>`
    : (vacVal === 'なし'
      ? `<span class="badge vac-no">誘致余地なし</span>`
      : `<span class="badge vac-no">誘致余地 未調査</span>`);
  const expanded = expandedIndex === idx;
  const listNo = 'NO. ' + String(idx + 1).padStart(3, '0');
  const multi = g.facilities.length > 1;

  let html = `<div class="card ${isMall?'t-mall':'t-clinic'}" data-idx="${idx}">
    <div class="card-top">
      <div class="card-title">${esc(g.base)}</div>
      <div class="listno">${listNo}</div>
    </div>
    <div class="badges">
      ${vacBadge}
      <span class="badge ${isMall?'tag-mall':'tag-clinic'}">${esc(g['分類'])}${multi ? '・施設' + g.facilities.length + '件' : ''}</span>
    </div>
    <div class="row-line">📍 ${g['所在地'] ? esc(g['所在地']) : '<span class="muted">住所調査中</span>'}</div>`;

  if(expanded){
    html += `<div class="detail">`;
    html += photoBlock(g);
    html += docBlock(g);
    html += `<div class="facility-list">${facilityListHtml(g.facilities)}</div>`;
    html += `<div class="spec">`;
    html += drow('所在地', mapLink(g['所在地']));
    html += drow(isMall ? '空きテナント' : '周辺空き地', esc(g['空きテナント面積(坪)／空き地面積(坪)']), true);
    html += drow(isMall ? '賃料目安' : '想定坪単価', esc(g['賃料目安／想定坪単価']), true);
    html += drow('既存テナント診療科', esc(g['既存テナント診療科構成（モール型のみ）']));
    html += drow('用途地域', esc(g['用途地域（クリニック型のみ）']));
    html += drow('連絡先', esc(g['管理会社・地主/仲介先連絡先']));
    html += drow('アクセス', esc(g['アクセス（最寄駅・幹線道路）']));
    html += drow('周辺医療機関', esc(g['周辺医療機関（診療科:距離、カンマ区切り）']));
    html += drow('不足診療科', esc(g['不足していそうな診療科（誘致ターゲット候補）']) ? `<b>${esc(g['不足していそうな診療科（誘致ターゲット候補）'])}</b>` : '');
    html += drow('更新日', esc(formatDateDisplay(g['情報更新日'])));
    html += drow('備考', esc(g['備考']));
    html += `</div>`;
    html += `</div><div class="chevron">閉じる ▲</div>`;
  } else {
    html += `<div class="chevron">詳細を見る ▼</div>`;
  }
  html += `</div>`;
  return html;
}

function render(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = allData.filter(g=>{
    if(currentTab === 'recruiting' && (g['誘致余地'] || '').trim() !== 'あり') return false;
    if(q){
      const facilityNames = g.facilities.map(f=>f.name).join('');
      const hay = (esc(g.base) + esc(g['所在地']) + facilityNames).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  document.getElementById('countLabel').textContent = allData.length ? (filtered.length + ' / ' + allData.length + ' 件') : '';
  const listEl = document.getElementById('list');
  if(filtered.length === 0){
    listEl.innerHTML = '<div class="status">該当する候補がありません</div>';
    return;
  }
  listEl.innerHTML = filtered.map((g)=>{
    const realIdx = allData.indexOf(g);
    return cardHtml(g, realIdx);
  }).join('');
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.t;
    render();
  });
});

document.getElementById('searchInput').addEventListener('input', render);

document.getElementById('list').addEventListener('click', (e)=>{
  const card = e.target.closest('.card');
  if(!card) return;
  if(e.target.closest('a')) return;
  const idx = Number(card.dataset.idx);
  expandedIndex = (expandedIndex === idx) ? null : idx;
  render();
});

loadData();
</script>
</body>
</html>
